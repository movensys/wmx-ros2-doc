name: Link check

on:
  pull_request:
    branches: [main, devel]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  linkcheck:
    name: sphinx linkcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install sphinx + extensions
        run: |
          python -m pip install --upgrade pip
          if [ -f doc/requirements.txt ]; then
            pip install -r doc/requirements.txt
          else
            pip install sphinx pydata-sphinx-theme myst-parser sphinxcontrib-mermaid sphinx-design
          fi
      - name: sphinx-build -b linkcheck
        run: |
          sphinx-build -b linkcheck doc doc/_build/linkcheck
      - name: Upload linkcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-report
          path: doc/_build/linkcheck/output.txt
          if-no-files-found: ignore
