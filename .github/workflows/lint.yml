name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  codespell:
    name: codespell (typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install codespell
        run: pip install codespell
      - name: Run codespell
        run: codespell

  sphinx-strict:
    name: sphinx-build (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install sphinx + extensions
        run: |
          python -m pip install --upgrade pip
          if [ -f doc/requirements.txt ]; then
            pip install -r doc/requirements.txt
          else
            pip install sphinx pydata-sphinx-theme myst-parser sphinxcontrib-mermaid sphinx-design
          fi
      - name: Build with -W --keep-going
        run: |
          sphinx-build -W --keep-going -b html doc doc/_build/html

  mermaid:
    name: mermaid syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli
      - name: Find and validate .mmd files
        run: |
          set -e
          mapfile -t files < <(find doc -name '*.mmd' -not -path '*/_build/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .mmd files found"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "=== validating: $f ==="
            mmdc -i "$f" -o "/tmp/$(basename "$f" .mmd).svg" --quiet
            echo "  OK"
          done
      - name: Extract and validate inline .. mermaid:: blocks
        run: |
          set -e
          python3 <<'PY'
          import re, sys, subprocess, tempfile, pathlib
          rst_files = list(pathlib.Path("doc").rglob("*.rst"))
          rst_files += list(pathlib.Path("doc").rglob("*.md"))
          block_re = re.compile(r"^[\t ]*\.\.\s+mermaid::\s*$", re.MULTILINE)
          fail = 0
          for f in rst_files:
              if "/_build/" in str(f):
                  continue
              text = f.read_text()
              for m in block_re.finditer(text):
                  # Capture indented body following the directive
                  start = m.end()
                  lines = text[start:].splitlines()
                  body = []
                  base_indent = None
                  for line in lines[1:]:
                      if not line.strip():
                          body.append("")
                          continue
                      indent = len(line) - len(line.lstrip())
                      if base_indent is None:
                          base_indent = indent
                      if indent < base_indent:
                          break
                      body.append(line[base_indent:])
                  diagram = "\n".join(body).strip()
                  if not diagram:
                      continue
                  with tempfile.NamedTemporaryFile(suffix=".mmd", mode="w", delete=False) as tf:
                      tf.write(diagram)
                      tmp = tf.name
                  print(f"=== validating inline block in: {f} (line {text[:m.start()].count(chr(10))+1}) ===")
                  r = subprocess.run(["mmdc", "-i", tmp, "-o", "/tmp/inline.svg", "--quiet"], capture_output=True, text=True)
                  if r.returncode != 0:
                      print(r.stdout, r.stderr)
                      fail += 1
                  else:
                      print("  OK")
          sys.exit(1 if fail else 0)
          PY
